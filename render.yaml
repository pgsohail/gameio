# Free deploy on Render: https://render.com
# 1. Push this repo to GitHub
# 2. Render Dashboard → New → Blueprint → connect repo
# 3. Add VITE_GOOGLE_CLIENT_ID + GOOGLE_CLIENT_ID (same value) if using Google sign-in
services:
  - type: web
    name: gameio
    runtime: node
    plan: free
    # Install devDependencies too (vite) — NODE_ENV=production skips them otherwise → exit 127
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Same OAuth Client ID for both (create free at console.cloud.google.com)
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
