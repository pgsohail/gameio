# Fly.io — https://fly.io/docs/languages-and-frameworks/node/
# First deploy: fly launch (already done for buildupio)
# Secrets:   fly secrets set JWT_SECRET=... GOOGLE_CLIENT_ID=... -a buildupio
# Build arg: fly deploy --build-arg VITE_GOOGLE_CLIENT_ID=... -a buildupio

app = 'buildupio'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    grace_period = '25s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    timeout = '5s'
